<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CaroNet AI</title>
  
  <!-- SEO & Open Graph Meta Tags -->
  <meta name="description" content="Play Gomoku against a powerful Neural Network AI trained with AlphaZero and Monte Carlo Tree Search. A sleek, modern board game experience." />
  <meta property="og:title" content="CaroNet AI - AlphaZero Gomoku" />
  <meta property="og:description" content="Play Gomoku against a powerful Neural Network AI. Experience the modern aesthetic." />
  <meta property="og:image" content="/assets/thumbnail.png" />
  <meta property="og:url" content="https://ngoo.app/" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="assets/favicon.png" />

  <!-- React & Babel (Offline Support) -->
  <script src="lib/react.min.js"></script>
  <script src="lib/react-dom.min.js"></script>
  <script src="lib/babel.min.js"></script>
  <!-- Tailwind CSS -->
  <script src="lib/tailwindcss.js"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
    body { margin: 0; font-family: 'Inter', sans-serif; overflow-x: hidden; background-color: #0c111b; color: #e2e8f0; }
    .bg-theme-bg { background-color: #0c111b; } /* slate-950/blue dark */
    .bg-theme-panel { background-color: #161d2e; } 
    .bg-theme-card { background-color: #1e293b; } 
    
    @keyframes panelShine {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .bg-aurora {
      background-image: linear-gradient(135deg, rgba(30, 58, 138, 0.25), rgba(15, 23, 42, 0.9), rgba(30, 58, 138, 0.25));
      background-size: 200% 200%;
      animation: panelShine 15s ease infinite;
    }

    .board-cell { position: relative; transition: background-color 0.15s ease; }
    .board-cell:hover:not(:disabled) { background-color: rgba(99,102,241,0.12); }
    .piece-x { animation: popIn 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    .piece-o { animation: popIn 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    @keyframes popIn { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(56,189,248,0.4); } 70% { box-shadow: 0 0 0 6px rgba(56,189,248,0); } 100% { box-shadow: 0 0 0 0 rgba(56,189,248,0); } }
    .ai-prob-badge { animation: pulse 2s infinite; }
    
    .sidebar-card { background-color: #161d2e; border-radius: 12px; padding: 16px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.05); }
    .btn { border: none; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 6px; font-weight: 700; border-radius: 10px; transition: all 0.15s ease; font-size: 14px; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-secondary { background: #1e2740; color: #94a3b8; padding: 8px 14px; }
    .btn-secondary:hover:not(:disabled) { background: #283352; color: #e2e8f0; }
    
    .btn-primary { background: #4f46e5; color: white; padding: 10px 16px; }
    .btn-primary:hover:not(:disabled) { background: #6366f1; }
    .btn-amber { background: #d97706; color: white; padding: 10px 16px; }
    .btn-amber:hover:not(:disabled) { background: #f59e0b; }
    .btn-purple { background: #7c3aed; color: white; padding: 10px 16px; }
    .btn-purple:hover:not(:disabled) { background: #8b5cf6; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    /** @jsx React.createElement */
    const { useState, useEffect, useRef } = React;

    const GomokuUI = () => {
      const [apiBase, setApiBase] = useState(() => {
        if (typeof window !== "undefined") {
          const saved = localStorage.getItem("gomoku_api_base");
          if (saved) return saved;
          return ""; // Use relative path by default, perfect for same-domain HTTPS
        }
        return "";
      });
      const [boardRows, setBoardRows] = useState(15);
      const [boardCols, setBoardCols] = useState(15);
      const [board, setBoard] = useState(Array.from({ length: 15 }, () => Array(15).fill(0)));
      const [currentPlayer, setCurrentPlayer] = useState("X");
      const [winner, setWinner] = useState(null);
      const [difficulty, setDifficulty] = useState("medium");
      const [ruleType, setRuleType] = useState(0);
      const [playerSymbol, setPlayerSymbol] = useState("X");
      const [gameMode, setGameMode] = useState("pva");
      const [showSettings, setShowSettings] = useState(true);
      const [gameId, setGameId] = useState(null);
      const [isAiThinking, setIsAiThinking] = useState(false);
      const [lastMove, setLastMove] = useState(null);
      const [history, setHistory] = useState([]);
      const [historyIndex, setHistoryIndex] = useState(-1);
      const [topAiMoves, setTopAiMoves] = useState([]);
      const [isReplaying, setIsReplaying] = useState(false);
      const [isAutoPlaying, setIsAutoPlaying] = useState(false);
      const [threats, setThreats] = useState(new Set());
      const [isCustomMode, setIsCustomMode] = useState(false);
      const [customNextPlayer, setCustomNextPlayer] = useState(1);
      const [evalScore, setEvalScore] = useState(0.0);

      useEffect(() => {
        if (typeof window !== "undefined") {
          localStorage.setItem("gomoku_api_base", apiBase);
        }
      }, [apiBase]);

      const buildApiUrl = (path) => {
        const trimmed = apiBase.trim();
        if (!trimmed) return path; // Relative path
        const base = trimmed.endsWith("/") ? trimmed.slice(0, -1) : trimmed;
        return `${base}${path}`;
      };

      const initBoard = () => {
        const newBoard = Array.from({ length: boardRows }, () => Array(boardCols).fill(0));
        setBoard(newBoard);
        setWinner(null);
        setCurrentPlayer("X");
        setGameId(null);
        setIsAiThinking(false);
        setLastMove(null);
        setHistory([]);
        setHistoryIndex(-1);
        setTopAiMoves([]);
        setIsReplaying(false);
        setIsAutoPlaying(false);
        setThreats(new Set());
        setEvalScore(0.0);
      };

      useEffect(() => {
        initBoard();
      }, [boardRows, boardCols]);

      // --- POLLING LOGIC ---
      useEffect(() => {
        let interval;
        if (isAiThinking && gameId) {
          interval = setInterval(async () => {
            try {
              const res = await fetch(buildApiUrl(`/games/${gameId}/thinking`));
              if (res.ok) {
                const data = await res.json();
                setTopAiMoves(data.top_ai_moves || []);
              }
            } catch (e) {}
          }, 300);
        }
        return () => clearInterval(interval);
      }, [isAiThinking, gameId]);

      // --- AUTO REPLAY LOGIC ---
      useEffect(() => {
        let timer;
        if (isReplaying && isAutoPlaying) {
          timer = setInterval(() => {
            setHistoryIndex((prev) => {
              if (prev >= history.length - 1) {
                setIsAutoPlaying(false);
                return prev;
              }
              const nextState = history[prev + 1];
              setBoard(nextState.board.map((r) => [...r]));
              setCurrentPlayer(nextState.player);
              setLastMove(nextState.lastMove);
              setTopAiMoves(nextState.topAiMoves || []);
              setThreats(detectThreats(nextState.board));
              return prev + 1;
            });
          }, 800);
        }
        return () => clearInterval(timer);
      }, [isReplaying, isAutoPlaying, history]);

      const detectThreats = (b) => {
        const foundThreats = new Set();
        const directions = [[0, 1], [1, 0], [1, 1], [1, -1]];
        
        for (let r = 0; r < boardRows; r++) {
          for (let c = 0; c < boardCols; c++) {
            if (b[r][c] === 0) continue;
            const p = b[r][c];
            
            for (const [dr, dc] of directions) {
              let seq = "";
              let coords = [];
              // We look at a window of 9 cells around the current stone (-4 to 4)
              for (let i = -4; i <= 4; i++) {
                const nr = r + dr * i, nc = c + dc * i;
                if (nr >= 0 && nr < boardRows && nc >= 0 && nc < boardCols) {
                  seq += b[nr][nc] === p ? '1' : (b[nr][nc] === 0 ? '0' : '2');
                  coords.push([nr, nc]);
                } else {
                  seq += '2';
                  coords.push([-1, -1]);
                }
              }
              
              // 1. Check for 4-threats (4 or 5 stones in a 5-window)
              for (let start = 0; start <= 4; start++) {
                const window = seq.substring(start, start + 5);
                if (!window.includes('2')) {
                   const count1 = (window.match(/1/g) || []).length;
                   if (count1 >= 4) {
                      let leftBlock = start > 0 ? seq[start - 1] === '2' : true;
                      let rightBlock = start + 5 < 9 ? seq[start + 5] === '2' : true;
                      
                      if (parseInt(ruleType) === 1 && leftBlock && rightBlock) {
                         continue;
                      }
                      
                      for (let k = 0; k < 5; k++) {
                        if (window[k] === '1') {
                          foundThreats.add(`${coords[start + k][0]},${coords[start + k][1]}`);
                        }
                      }
                   }
                }
              }

              // 2. Check for Open 3-threats (3 stones in a 6-window with 0 at both ends)
              for (let start = 0; start <= 3; start++) {
                const window = seq.substring(start, start + 6);
                if (window[0] === '0' && window[5] === '0' && !window.includes('2')) {
                   const count1 = (window.match(/1/g) || []).length;
                   if (count1 === 3) {
                      for (let k = 0; k < 6; k++) {
                        if (window[k] === '1') {
                          foundThreats.add(`${coords[start + k][0]},${coords[start + k][1]}`);
                        }
                      }
                   }
                }
              }
            }
          }
        }
        return foundThreats;
      };

      const saveToHistory = (boardState, player, lm, topMoves = [], score = 0.0) => {
        setHistory((prev) => {
          const newHistory = prev.slice(0, historyIndex + 1);
          return [
            ...newHistory,
            {
              board: boardState.map((r) => [...r]),
              player,
              lastMove: lm,
              topAiMoves: topMoves,
              evalScore: score,
            },
          ];
        });
        setHistoryIndex(historyIndex + 1);
      };

      const undo = (steps = 1) => {
        if (historyIndex - steps < 0) return;
        const prevState = history[historyIndex - steps];
        setBoard(prevState.board.map(r => [...r]));
        setCurrentPlayer(prevState.player);
        setLastMove(prevState.lastMove);
        setTopAiMoves(prevState.topAiMoves || []);
        setThreats(detectThreats(prevState.board));
        setEvalScore(prevState.evalScore || 0.0);
        setHistoryIndex(historyIndex - steps);
        setWinner(null);
      };

      const redo = (steps = 1) => {
        if (historyIndex + steps >= history.length) return;
        const nextState = history[historyIndex + steps];
        setBoard(nextState.board.map(r => [...r]));
        setCurrentPlayer(nextState.player);
        setLastMove(nextState.lastMove);
        setTopAiMoves(nextState.topAiMoves || []);
        setThreats(detectThreats(nextState.board));
        setEvalScore(nextState.evalScore || 0.0);
        setHistoryIndex(historyIndex + steps);
        setWinner(null);
      };

      const handleUndo = () => { if (!isReplaying) undo(1); };
      const handleRedo = () => { if (!isReplaying) redo(1); };

      const toggleReplay = () => {
        if (isReplaying) {
          setIsReplaying(false);
          setIsAutoPlaying(false);
          redo(history.length - 1 - historyIndex);
        } else {
          if (history.length <= 1) return;
          setIsReplaying(true);
          setHistoryIndex(0);
          setBoard(history[0].board.map(r => [...r]));
          setThreats(new Set());
          setLastMove(null);
          setTopAiMoves([]);
        }
      };

      const makeMove = async (row, col) => {
        if (winner || isAiThinking || isReplaying) return;
        if (!board || !board[row] || board[row][col] !== 0) return;
        
        if (gameMode === "pva") {
          const humanValue = playerSymbol === "X" ? 1 : -1;
          const currentValue = currentPlayer === "X" ? 1 : -1;
          if (currentValue !== humanValue) return;
        }

        if (gameMode === "pvp") {
          const newBoard = board.map((r) => [...r]);
          newBoard[row][col] = currentPlayer === "X" ? 1 : -1;
          setBoard(newBoard);
          setLastMove([row, col]);
          const nextPlayer = currentPlayer === "X" ? "O" : "X";
          saveToHistory(newBoard, nextPlayer, [row, col], [], evalScore);
          setThreats(detectThreats(newBoard));

          if (checkWinner(newBoard, row, col, currentPlayer === "X" ? 1 : -1)) {
            setWinner(currentPlayer);
          } else {
            setCurrentPlayer(nextPlayer);
            setTopAiMoves([]); // Ẩn gợi ý nước đi trong chế độ PvP
            fetch(buildApiUrl("/games/custom"), {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                board: newBoard,
                board_rows: boardRows,
                board_cols: boardCols,
                next_player: nextPlayer === "X" ? 1 : -1,
                human_player: nextPlayer === "X" ? -1 : 1,
                difficulty: "easy", // Ép về 10 sims cho siêu nhanh
                rule_type: ruleType
              })
            }).then(res => res.json()).then(data => {
              setEvalScore(data.eval_score || 0.0);
            }).catch(console.error);
          }
          return;
        }

        const humanBoard = board.map((r) => [...r]);
        humanBoard[row][col] = currentPlayer === "X" ? 1 : -1;
        setBoard(humanBoard);
        setLastMove([row, col]);
        setThreats(detectThreats(humanBoard));
        const aiSymbol = playerSymbol === "X" ? "O" : "X";
        saveToHistory(humanBoard, aiSymbol, [row, col], [], evalScore);

        if (checkWinner(humanBoard, row, col, currentPlayer === "X" ? 1 : -1)) {
          setWinner(currentPlayer);
          return;
        }

        setIsAiThinking(true);
        setTopAiMoves([]);

        try {
          const res = await fetch(buildApiUrl(`/games/${gameId}/move`), {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ row, col }),
          });
          if (!res.ok) throw new Error("AI move failed");
          const data = await res.json();
          const aiBoard = data.board;
          setBoard(aiBoard);
          setLastMove(data.ai_move);
          const tm = data.top_ai_moves || [];
          setThreats(detectThreats(aiBoard));
          setEvalScore(data.eval_score || 0.0);
          saveToHistory(aiBoard, playerSymbol, data.ai_move, tm, data.eval_score || 0.0);
          if (data.winner) {
            setWinner(data.winner === 1 ? "X" : "O");
          } else {
            setCurrentPlayer(playerSymbol);
          }
        } catch (error) {
          console.error(error);
          alert("Lỗi AI: " + error.message);
        } finally {
          setIsAiThinking(false);
        }
      };

      const checkWinner = (b, row, col, player) => {
        const directions = [[0, 1], [1, 0], [1, 1], [1, -1]];
        for (const [dr, dc] of directions) {
          let count = 1;
          let blocks = 0;
          for (let i = 1; i < 5; i++) {
            const nr = row + dr * i, nc = col + dc * i;
            if (nr >= 0 && nr < boardRows && nc >= 0 && nc < boardCols) {
              if (b[nr][nc] === player) count++;
              else if (b[nr][nc] === -player) { blocks++; break; }
              else break;
            } else { break; }
          }
          for (let i = 1; i < 5; i++) {
            const nr = row - dr * i, nc = col - dc * i;
            if (nr >= 0 && nr < boardRows && nc >= 0 && nc < boardCols) {
              if (b[nr][nc] === player) count++;
              else if (b[nr][nc] === -player) { blocks++; break; }
              else break;
            } else { break; }
          }
          if (count >= 5) {
            if (ruleType === 1 && count === 5 && blocks === 2) continue;
            return true;
          }
        }
        return false;
      };

      const handleCustomClick = (row, col, e) => {
        if (!isCustomMode) return;
        e.preventDefault();
        const newBoard = board.map(r => [...r]);
        if (e.type === 'contextmenu') {
          newBoard[row][col] = newBoard[row][col] === -1 ? 0 : -1;
        } else {
          newBoard[row][col] = newBoard[row][col] === 1 ? 0 : 1;
        }
        setBoard(newBoard);
      };

      const startCustomGame = async () => {
        setIsCustomMode(false);
        setIsAiThinking(true);
        // Wipe old game state since we are starting a new custom game
        setHistory([]);
        setHistoryIndex(-1);
        setWinner(null);
        setTopAiMoves([]);
        setLastMove(null);

        try {
          const humanValue = playerSymbol === "X" ? 1 : -1;
          const payload = {
            board: board,
            board_rows: boardRows,
            board_cols: boardCols,
            next_player: customNextPlayer,
            human_player: humanValue,
            difficulty: difficulty,
            rule_type: ruleType,
          };
          const res = await fetch(buildApiUrl("/games/custom"), {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
          if (!res.ok) throw new Error("Failed to create custom game");
          const game = await res.json();
          setGameId(game.game_id);
          setBoard(game.board);
          setCurrentPlayer(game.current_player === 1 ? "X" : "O");
          if (game.ai_move && game.ai_move.length === 2) {
            setLastMove(game.ai_move);
            saveToHistory(game.board, playerSymbol, game.ai_move, game.top_ai_moves || []);
          } else {
            saveToHistory(game.board, customNextPlayer === 1 ? "X" : "O", null, []);
          }
        } catch (error) {
          alert("Failed: " + error.message);
          setIsCustomMode(true);
        } finally {
          setIsAiThinking(false);
        }
      };

      const enterCustomMode = () => {
        setIsCustomMode(true);
        setIsReplaying(false);
      };

      const startGame = async () => {
        setShowSettings(false);
        initBoard();
        if (gameMode === "pva") {
            setIsAiThinking(true);
            try {
              const payload = { board_rows: boardRows, board_cols: boardCols, human_player: playerSymbol === "X" ? 1 : -1, difficulty: difficulty, rule_type: ruleType };
              const res = await fetch(buildApiUrl("/games"), {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload),
              });
              if (!res.ok) throw new Error("Failed to create game");
              const game = await res.json();
              setGameId(game.game_id);
              setBoard(game.board);
              setCurrentPlayer(game.current_player === 1 ? "X" : "O");
              if (game.ai_move && game.ai_move.length === 2) {
                setLastMove(game.ai_move);
                saveToHistory(game.board, playerSymbol, game.ai_move, game.top_ai_moves || []);
              } else {
                saveToHistory(game.board, "X", null, []);
              }
            } catch (error) {
              alert("Failed: " + error.message);
              setShowSettings(true);
            } finally {
              setIsAiThinking(false);
            }
        } else {
            saveToHistory(Array.from({ length: boardRows }, () => Array(boardCols).fill(0)), "X", null, []);
        }
      };

      const cellSize = Math.min(60, Math.floor(800 / Math.max(boardRows, boardCols)));

      if (showSettings) {
        return (
          <div className="min-h-screen flex items-center justify-center bg-theme-bg bg-aurora text-slate-200 p-4">
            <div className="rounded-2xl p-8 w-full max-w-lg bg-theme-card border border-slate-800/50 shadow-2xl">
              <div className="text-center mb-6">
                <img src="assets/favicon.png" alt="" className="w-14 h-14 rounded-2xl mx-auto mb-3" />
                <h1 className="text-3xl font-black text-slate-100">CaroNet AI</h1>
                <div className="text-[10px] uppercase tracking-widest text-slate-500 font-bold mt-1">MCTS v2.0 · Neural AlphaZero</div>
              </div>
              <div className="space-y-4">
                <div>
                  <label className="block text-xs font-bold mb-1.5 text-slate-400 uppercase tracking-wider">Game Mode</label>
                  <div className="flex rounded-lg p-1 bg-theme-bg border border-slate-800">
                    <button onClick={() => setGameMode("pva")} className={`flex-1 py-2 rounded-md text-sm font-bold transition ${gameMode === "pva" ? "bg-slate-700 text-white shadow" : "text-slate-500 hover:text-white"}`}>Player vs AI</button>
                    <button onClick={() => setGameMode("pvp")} className={`flex-1 py-2 rounded-md text-sm font-bold transition ${gameMode === "pvp" ? "bg-slate-700 text-white shadow" : "text-slate-500 hover:text-white"}`}>Player vs Player</button>
                  </div>
                </div>

                {gameMode === "pva" && (
                  <>
                    <div>
                      <label className="block text-xs font-bold mb-1.5 text-slate-400 uppercase tracking-wider">Play As</label>
                      <div className="flex rounded-lg p-1 bg-theme-bg border border-slate-800">
                        <button onClick={() => setPlayerSymbol("X")} className={`flex-1 py-2 rounded-md text-sm font-bold transition flex justify-center items-center gap-1.5 ${playerSymbol === "X" ? "bg-slate-700 text-white shadow" : "text-slate-500 hover:text-white"}`}><i className="fa-solid fa-xmark"></i> X (First)</button>
                        <button onClick={() => setPlayerSymbol("O")} className={`flex-1 py-2 rounded-md text-sm font-bold transition flex justify-center items-center gap-1.5 ${playerSymbol === "O" ? "bg-slate-700 text-white shadow" : "text-slate-500 hover:text-white"}`}><i className="fa-regular fa-circle text-xs"></i> O (Second)</button>
                      </div>
                    </div>
                    <div>
                      <label className="block text-xs font-bold mb-1.5 text-slate-400 uppercase tracking-wider">AI Level</label>
                      <select value={difficulty} onChange={(e) => setDifficulty(e.target.value)} className="w-full p-2.5 rounded-lg text-slate-200 text-sm font-semibold outline-none border border-slate-700 transition focus:border-slate-500 bg-theme-bg">
                        <option value="easy">Easy (10 Sims)</option>
                        <option value="medium">Medium (30 Sims)</option>
                        <option value="hard">Hard (50 Sims)</option>
                        <option value="extreme">Extreme (100 Sims)</option>
                      </select>
                    </div>
                    <div>
                      <label className="block text-xs font-bold mb-1.5 text-slate-400 uppercase tracking-wider">Rules</label>
                      <select value={ruleType} onChange={(e) => setRuleType(Number(e.target.value))} className="w-full p-2.5 rounded-lg text-slate-200 text-sm font-semibold outline-none border border-slate-700 transition focus:border-slate-500 bg-theme-bg">
                        <option value={0}>Gomoku (Free-style)</option>
                        <option value={1}>Caro (Blocked = No Win)</option>
                      </select>
                    </div>
                  </>
                )}

                <div>
                  <label className="block text-xs font-bold mb-1.5 text-slate-400 uppercase tracking-wider">Board Size</label>
                  <div className="flex gap-2 items-center">
                    <input type="number" value={boardCols} onChange={(e) => setBoardCols(Number(e.target.value))} className="w-full p-2.5 rounded-lg text-center font-bold text-sm border border-slate-700 text-slate-200 transition focus:border-slate-500 bg-theme-bg" />
                    <span className="text-slate-600 font-bold">×</span>
                    <input type="number" value={boardRows} onChange={(e) => setBoardRows(Number(e.target.value))} className="w-full p-2.5 rounded-lg text-center font-bold text-sm border border-slate-700 text-slate-200 transition focus:border-slate-500 bg-theme-bg" />
                  </div>
                </div>

                <div className="flex gap-2 pt-2">
                  <button onClick={startGame} className="btn btn-primary flex-1 py-3 text-base">START GAME</button>
                  <button onClick={() => { setShowSettings(false); enterCustomMode(); }} className="btn btn-purple py-3 px-4" title="Custom Board Setup">
                    <i className="fa-solid fa-chess-board text-lg"></i>
                  </button>
                </div>
              </div>
            </div>
          </div>
        );
      }

      const currentRankingMoves = isAiThinking ? topAiMoves : (historyIndex >= 0 ? (history[historyIndex]?.topAiMoves || []) : []);

      return (
        <div className="min-h-screen flex flex-col bg-theme-bg bg-aurora text-slate-200">
          {/* ─── Navbar ─── */}
          <header className="h-14 flex items-center justify-between px-5 border-b border-slate-800 bg-theme-panel/80 backdrop-blur-md">
            <div className="flex items-center gap-3">
              <img src="assets/favicon.png" alt="" className="w-9 h-9 rounded-xl" />
              <div className="leading-tight">
                <span className="text-lg font-black text-slate-100">CaroNet</span>
                <div className="text-[9px] uppercase tracking-[0.2em] text-slate-500 font-bold">MCTS v2.0</div>
              </div>
            </div>
            {/* Gear slightly larger */}
            <button onClick={() => setShowSettings(true)} className="btn w-10 h-10 !p-0 rounded-full bg-slate-800 text-slate-400 hover:bg-slate-700 hover:text-white border border-slate-700 shadow-sm transition-colors">
              <i className="fa-solid fa-gear text-lg"></i>
            </button>
          </header>

          {/* ─── Body ─── */}
          <div className="flex-1 flex flex-col md:flex-row overflow-hidden">

            {/* ─── Left Sidebar ─── */}
            <aside className="w-full md:w-72 flex-shrink-0 p-4 flex flex-col gap-3 overflow-y-auto bg-theme-panel/80 backdrop-blur-md border-r border-slate-800">

              {/* Status */}
              <div className="sidebar-card">
                <div className="text-[10px] uppercase tracking-widest text-slate-500 font-bold mb-3">Status</div>
                {winner ? (
                  <div className="text-center py-3">
                    <i className="fa-solid fa-trophy text-2xl text-slate-400 mb-1"></i>
                    <div className="text-lg font-black text-slate-100">Player {winner} Wins!</div>
                  </div>
                ) : isAiThinking ? (
                  <div className="flex items-center gap-3">
                    <div className="w-7 h-7 rounded-full border-2 border-slate-400 border-t-transparent animate-spin flex-shrink-0"></div>
                    <div>
                      <div className="text-slate-300 font-bold text-sm">AI is thinking…</div>
                      <div className="text-[10px] text-slate-500">Evaluating paths</div>
                    </div>
                  </div>
                ) : (
                  <div className="flex items-center justify-between">
                    <span className="text-slate-400 text-sm">Turn</span>
                    <span className={`text-xl font-black text-slate-100`}>{currentPlayer}</span>
                  </div>
                )}
              </div>

              {/* AI Predictions in Sidebar */}
              {currentRankingMoves.length > 0 && !isReplaying && (
                <div className="sidebar-card">
                  <div className="text-[10px] uppercase tracking-widest text-slate-400 font-bold mb-2 flex items-center gap-1.5">
                    <i className="fa-solid fa-microchip text-xs"></i> AI Predictions
                  </div>
                  <div className="flex flex-col gap-1.5 mt-2">
                    {currentRankingMoves.map((m, idx) => (
                      <div key={idx} className="flex items-center justify-between text-[11px] font-mono">
                        <div className="flex items-center gap-2">
                          <div className="w-1.5 h-1.5 rounded-full bg-slate-500"></div>
                          <span className="text-slate-300">{String.fromCharCode(65 + m.col)}{m.row + 1}</span>
                        </div>
                        <span className="text-slate-400 font-bold">{Math.round(m.prob * 100)}%</span>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {/* Controls */}
              <div className="sidebar-card flex-1">
                <div className="text-[10px] uppercase tracking-widest text-slate-500 font-bold mb-3">Controls</div>

                {!isReplaying ? (
                  <div className="grid grid-cols-2 gap-2 mb-3">
                    <button onClick={handleUndo} disabled={historyIndex <= (gameMode === "pva" ? 1 : 0) || isAiThinking} className="btn btn-secondary w-full flex-col !gap-1 py-2">
                      <i className="fa-solid fa-rotate-left"></i><span className="text-[11px]">Undo</span>
                    </button>
                    <button onClick={handleRedo} disabled={historyIndex >= history.length - (gameMode === "pva" ? 2 : 1) || isAiThinking} className="btn btn-secondary w-full flex-col !gap-1 py-2">
                      <i className="fa-solid fa-rotate-right"></i><span className="text-[11px]">Redo</span>
                    </button>
                  </div>
                ) : (
                  <div className="rounded-lg p-3 mb-3 bg-theme-bg border border-slate-800">
                    <div className="text-center text-[10px] font-bold text-slate-400 mb-2 uppercase tracking-widest">Replay</div>
                    <div className="flex items-center justify-between gap-1 mb-2">
                      <button onClick={() => undo(historyIndex)} disabled={historyIndex <= 0} className="btn btn-secondary !p-0 w-8 h-8"><i className="fa-solid fa-backward-fast text-xs"></i></button>
                      <button onClick={() => undo(1)} disabled={historyIndex <= 0} className="btn btn-secondary !p-0 w-8 h-8"><i className="fa-solid fa-caret-left"></i></button>
                      <span className="text-slate-300 font-mono font-bold text-xs w-10 text-center">{Math.max(0, historyIndex)}/{Math.max(0, history.length - 1)}</span>
                      <button onClick={() => redo(1)} disabled={historyIndex >= history.length - 1} className="btn btn-secondary !p-0 w-8 h-8"><i className="fa-solid fa-caret-right"></i></button>
                      <button onClick={() => redo(history.length - 1 - historyIndex)} disabled={historyIndex >= history.length - 1} className="btn btn-secondary !p-0 w-8 h-8"><i className="fa-solid fa-forward-fast text-xs"></i></button>
                    </div>
                    <button onClick={() => setIsAutoPlaying(!isAutoPlaying)} disabled={historyIndex >= history.length - 1 && !isAutoPlaying} className={`btn w-full text-xs py-2 ${isAutoPlaying ? "bg-slate-600" : "btn-primary"}`}>
                      <i className={`fa-solid ${isAutoPlaying ? "fa-pause" : "fa-play"}`}></i> {isAutoPlaying ? "Pause" : "Auto Play"}
                    </button>
                  </div>
                )}

                <button onClick={toggleReplay} disabled={history.length <= 1 || isAiThinking}
                  className={`btn w-full mb-2 ${isReplaying ? "btn-amber" : "btn-secondary"}`}>
                  <i className={`fa-solid ${isReplaying ? "fa-xmark" : "fa-film"}`}></i>
                  {isReplaying ? "Exit Replay" : "Replay Mode"}
                </button>

                <button onClick={enterCustomMode} disabled={isAiThinking || isReplaying} className="btn btn-purple w-full">
                  <i className="fa-solid fa-chess-board"></i> Custom Setup
                </button>
              </div>

              <div className="text-center text-[10px] text-slate-600 font-mono py-2">Neural AlphaZero Engine</div>
            </aside>

            {/* ─── Main Board Area ─── */}
            <main className="flex-1 flex flex-col items-center justify-center p-4 relative overflow-auto">

              {/* Custom Setup bar */}
              {isCustomMode && (
                <div className="sidebar-card !mb-3 w-full max-w-lg border border-slate-600">
                  <div className="text-center text-xs font-bold text-slate-300 uppercase tracking-wider mb-2">
                    <i className="fa-solid fa-chess-board mr-1"></i>Custom Board Setup
                  </div>
                  <div className="text-[10px] text-slate-500 text-center mb-2">Left click = X · Right click = O · Click piece to remove</div>
                  <div className="flex items-center justify-center gap-3 mb-2">
                    <span className="text-xs text-slate-400">Next:</span>
                    <div className="flex rounded-lg overflow-hidden bg-theme-bg border border-slate-700">
                      <button onClick={() => setCustomNextPlayer(1)} className={`px-3 py-1 text-xs font-bold transition ${customNextPlayer === 1 ? "bg-slate-700 text-white" : "text-slate-500 hover:text-white"}`}>X</button>
                      <button onClick={() => setCustomNextPlayer(-1)} className={`px-3 py-1 text-xs font-bold transition ${customNextPlayer === -1 ? "bg-slate-700 text-white" : "text-slate-500 hover:text-white"}`}>O</button>
                    </div>
                  </div>
                  <div className="flex gap-2">
                    <button onClick={startCustomGame} className="btn btn-primary flex-1 text-xs"><i className="fa-solid fa-play"></i> Start</button>
                    <button onClick={() => setBoard(Array.from({ length: boardRows }, () => Array(boardCols).fill(0)))} className="btn btn-secondary text-xs"><i className="fa-solid fa-eraser"></i> Clear</button>
                    <button onClick={() => { setIsCustomMode(false); if (historyIndex >= 0 && historyIndex < history.length) { setBoard(history[historyIndex].board.map(r => [...r])); } else { initBoard(); }}} className="btn btn-secondary text-xs"><i className="fa-solid fa-xmark"></i> Cancel</button>
                  </div>
                </div>
              )}

              {/* ─── Board Panel ─── */}
              <div className="rounded-2xl p-3 md:p-5 relative max-w-full overflow-auto bg-theme-card border border-slate-800 shadow-xl">

                {/* Replay badge */}
                {isReplaying && (
                  <div className="absolute -top-10 left-0 right-0 flex justify-center z-20">
                    <div className="bg-amber-500/15 border border-amber-500/40 text-amber-400 px-5 py-1.5 rounded-full font-bold text-xs tracking-widest uppercase flex items-center gap-2">
                      <span className="w-1.5 h-1.5 rounded-full bg-amber-400 animate-ping"></span>
                      Replay {Math.max(0, historyIndex)}/{Math.max(0, history.length - 1)}
                    </div>
                  </div>
                )}

                <div className="flex flex-col items-center">
                  <div className="flex items-start gap-1">

                    {/* Eval Bar */}
                    <div className="w-5 rounded-lg overflow-hidden bg-blue-600 flex flex-col justify-end relative mr-2 border border-slate-700/50" style={{ height: `${boardRows * cellSize}px`, marginTop: '0px' }}>
                      <div className="w-full transition-all duration-700 ease-in-out bg-rose-600" style={{ height: `${Math.max(0, Math.min(100, (1.0 - evalScore) / 2.0 * 100))}%` }}></div>
                      <div className="absolute top-1/2 left-0 right-0 h-px bg-black/40 z-10"></div>
                      <div className="absolute inset-0 flex flex-col justify-between items-center py-1.5 z-20 pointer-events-none">
                        <div className="flex flex-col items-center drop-shadow-md">
                          <span className="text-[10px] font-black text-white leading-none">X</span>
                          <span className="text-[7px] font-bold text-white/90 mt-0.5">{Math.round((evalScore + 1.0) / 2.0 * 100)}%</span>
                        </div>
                        <div className="flex flex-col items-center drop-shadow-md">
                          <span className="text-[7px] font-bold text-white/90 mb-0.5">{Math.round((1.0 - evalScore) / 2.0 * 100)}%</span>
                          <span className="text-[10px] font-black text-white leading-none">O</span>
                        </div>
                      </div>
                      <div className="absolute inset-0 z-30" title={`X ${Math.round((evalScore + 1.0) / 2.0 * 100)}% – O ${Math.round((1.0 - evalScore) / 2.0 * 100)}%`}></div>
                    </div>

                    {/* Row labels */}
                    <div className="flex flex-col justify-between mr-0.5" style={{ height: `${boardRows * cellSize}px` }}>
                      {Array.from({length: boardRows}).map((_, i) => (
                        <div key={`r${i}`} className="flex items-center justify-end font-bold text-slate-500 text-[10px] w-5" style={{ height: `${cellSize}px` }}>
                          {i + 1}
                        </div>
                      ))}
                    </div>

                    {/* The Board (UNCHANGED) */}
                    <div
                      className="inline-grid bg-white border-2 border-slate-300 shadow-xl"
                      style={{ gridTemplateColumns: `repeat(${boardCols}, ${cellSize}px)`, gridTemplateRows: `repeat(${boardRows}, ${cellSize}px)` }}
                    >
                  {board.map((row, i) =>
                    row.map((cell, j) => {
                      const isLastMove = lastMove && lastMove[0] === i && lastMove[1] === j;
                      const aiMoveData = topAiMoves.find(m => m.row === i && m.col === j);
                      const isTop1Move = isAiThinking && aiMoveData && topAiMoves.length > 0 && topAiMoves[0].row === i && topAiMoves[0].col === j;
                      const isThreat = threats.has(`${i},${j}`);
                      return (
                        <button
                          key={`${i}-${j}`}
                          onClick={(e) => {
                            if (isCustomMode) handleCustomClick(i, j, e);
                            else makeMove(i, j);
                          }}
                          onContextMenu={(e) => {
                            e.preventDefault();
                            if (isCustomMode) handleCustomClick(i, j, e);
                          }}
                          disabled={!isCustomMode && (cell !== 0 || winner !== null || isAiThinking || isReplaying)}
                          className={`board-cell border border-slate-300 transition flex items-center justify-center text-xl sm:text-2xl relative disabled:cursor-not-allowed ${isThreat ? "bg-rose-500/20" : "hover:bg-slate-100"}`}
                          style={{ width: `${cellSize}px`, height: `${cellSize}px`, fontSize: `${Math.floor(cellSize * 0.6)}px` }}
                        >
                          {isLastMove && <div className="absolute w-3/4 h-3/4 rounded-full bg-yellow-500/30"></div>}

                          {isTop1Move && (
                            <div className="absolute inset-0 flex items-center justify-center bg-blue-500/30 rounded-full z-10 m-1">
                               <span className="text-[10px] font-black text-white">{Math.round(aiMoveData.prob * 100)}%</span>
                            </div>
                          )}

                          {cell === 1 && (
                            <div className="w-[60%] h-[60%] relative z-20 piece-x flex items-center justify-center text-blue-600">
                              <div className="absolute w-[110%] h-[4px] sm:h-[5px] bg-current rotate-45 rounded-full shadow-sm"></div>
                              <div className="absolute w-[110%] h-[4px] sm:h-[5px] bg-current -rotate-45 rounded-full shadow-sm"></div>
                            </div>
                          )}
                          {cell === -1 && (
                            <div className="w-[55%] h-[55%] rounded-full border-[4px] sm:border-[5px] border-current piece-o relative z-20 text-rose-500 shadow-sm"></div>
                          )}
                        </button>
                      );
                    })
                  )}
                </div>
                  </div>

                  {/* Column labels (A, B, C...) */}
                  <div className="flex items-start gap-1 mt-1">
                    <div className="w-5 mr-2"></div>
                    <div className="w-5 mr-0.5"></div>
                    <div className="flex border-2 border-transparent">
                      {Array.from({length: boardCols}).map((_, j) => (
                        <div key={`c${j}`} className="flex justify-center font-bold text-slate-500 text-[10px]" style={{ width: `${cellSize}px` }}>
                          {String.fromCharCode(65 + j)}
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              </div>
            </main>
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<GomokuUI />);
  </script>
</body>
</html>
